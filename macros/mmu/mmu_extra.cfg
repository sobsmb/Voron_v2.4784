[gcode_macro MMU_CUT_TIP_JS]
description: Raise Z slightly, perform cut tip, then restore Z
gcode:
  {% set requested_lift = params.LIFT|default(10)|float %}
  {% set cur_z = printer.gcode_move.gcode_position.z|float %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set available_lift = max_z - cur_z %}
  {% set safe_lift = [requested_lift, available_lift]|min %}

  M118 MMU_CUT_TIP_JS: begin
  SAVE_GCODE_STATE NAME=MMU_CUT_TIP_JS_STATE
  G91

  {% if safe_lift > 0 %}
    M118 MMU_CUT_TIP_JS: lifting Z by {safe_lift}mm
    G1 Z{safe_lift} F20000
  {% else %}
    M118 MMU_CUT_TIP_JS: no lift available, already near max Z
  {% endif %}

  M118 MMU_CUT_TIP_JS: calling _MMU_CUT_TIP
  _MMU_CUT_TIP

  {% if safe_lift > 0 %}
    M118 MMU_CUT_TIP_JS: lowering Z by {safe_lift}mm
    G1 Z-{safe_lift} F20000
  {% endif %}

  RESTORE_GCODE_STATE NAME=MMU_CUT_TIP_JS_STATE
  M118 MMU_CUT_TIP_JS: complete