#####################################################################
# PRINT_VARS – store info between PRINT_START and PRINT_END
#####################################################################

[gcode_macro PRINT_VARS]
variable_material: "PLA"
gcode:
    M118 PRINT_VARS: material currently '${printer["gcode_macro PRINT_VARS"].material}'

#####################################################################
# PRINT_START – main start sequence
#####################################################################

[gcode_macro PRINT_START]
gcode:
    M118 ============= PRINT_START BEGIN =============
    SET_DISPLAY_TEXT MSG="Print start: init..."

    {% set INITEXTRUDER    = params.INITEXTRUDER|default(0)|int %}
    {% set BED             = params.BED|default(65)|float %}
    {% set BED_TEMP        = params.BED_TEMP|default(0)|float %}
    {% set EXTRUDER        = params.EXTRUDER|default(210)|float %}
    {% set EXTRUDER_TEMP   = params.EXTRUDER_TEMP|default(0)|float %}
    {% set MATERIAL        = params.MATERIAL|default("PLA")|string %}
    {% set PRINT_FLOW_RATE = params.FLOW_RATE|default(100)|int %}
    {% set Z_OFFSET        = params.Z_OFFSET|default(-0.110)|float %}
    {% set CHAMBER_TEMP    = params.CHAMBER_TEMP|default(0)|float %}

    {% set heat_hold       = printer["gcode_macro CHAMBER_HEAT_HOLD"].enabled|int %}
    {% set standby_ready   = printer["gcode_macro HOT_STANDBY"].ready|int %}
    {% set last_material   = printer["gcode_macro PRINT_VARS"].material %}
    {% set last_probe_z    = printer["gcode_macro HOT_STANDBY"].last_probe_z|float %}
    {% set sanity_tol      = 0.03 %}
    {% set fast_start_ok   = 0 %}

    M118 PRINT_START: Material={MATERIAL}, Bed={BED}C, Nozzle={EXTRUDER}C
    SET_DISPLAY_TEXT MSG="Mat:{MATERIAL} Bed:{BED}C Noz:{EXTRUDER}C"

    # Store requested material for later
    SET_GCODE_VARIABLE MACRO=PRINT_VARS VARIABLE=material VALUE="'{MATERIAL}'"

    # Cancel standby timeout / purge and any delayed enclosure shutdowns
    UPDATE_DELAYED_GCODE ID=HOT_STANDBY_TIMEOUT DURATION=0
    UPDATE_DELAYED_GCODE ID=HOT_STANDBY_PURGE DURATION=0
    UPDATE_DELAYED_GCODE ID=_DISABLE_NEVERMORE DURATION=0
    UPDATE_DELAYED_GCODE ID=_DISABLE_EXHAUST DURATION=0
    UPDATE_DELAYED_GCODE ID=_DISABLE_COOLING DURATION=0
    UPDATE_DELAYED_GCODE ID=_DISABLE_INTAKE DURATION=0

    # Allow override temps if provided
    {% if EXTRUDER_TEMP > 0 %}
        {% set EXTRUDER = EXTRUDER_TEMP %}
    {% endif %}
    {% if BED_TEMP > 0 %}
        {% set BED = BED_TEMP %}
    {% endif %}

    # Wake system
    WAKEUP
    PI_FAN_PRINT

    G21
    M220 S100
    M221 S100
    M107

    # Try fast-start only if standby looks valid
    {% if heat_hold == 1 and standby_ready == 1 and MATERIAL == last_material and printer.toolhead.homed_axes == "xyz" %}
        M118 PRINT_START: Hot standby candidate detected - running sanity probe.
        SET_DISPLAY_TEXT MSG="Fast start check..."

        G90
        G1 X150 Y150 F12000
        PROBE

        {% set probe_now = printer.probe.last_z_result|float %}
        {% set delta = (probe_now - last_probe_z)|abs %}

        M118 PRINT_START: Standby probe old={last_probe_z} new={probe_now} delta={delta}

        {% if delta <= sanity_tol %}
            {% set fast_start_ok = 1 %}
            M118 PRINT_START: Fast start approved.
            SET_DISPLAY_TEXT MSG="Fast start"
        {% else %}
            M118 PRINT_START: Fast start denied - probe delta too large, using normal start.
            SET_DISPLAY_TEXT MSG="Normal start"
        {% endif %}
    {% else %}
        M118 PRINT_START: Hot standby not valid, using normal start.
        SET_DISPLAY_TEXT MSG="Normal start"
    {% endif %}

    # Bed temp always stays active, even on fast start
    STATUS_BUSY
    M118 PRINT_START: Heating bed to {BED}C...
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED}

    {% if fast_start_ok == 1 %}
        # Consume standby state
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=ready VALUE=0
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=last_probe_z VALUE=0.0

        # Skip fan reconfig / mesh / clean / QGL
        M118 PRINT_START: Skipping home/QGL/mesh/nozzle clean.

    {% else %}
        # Clear standby state since we are doing a full start
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=ready VALUE=0
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=last_probe_z VALUE=0.0

        # Clear old bed mesh
        {% if printer.configfile.config["bed_mesh"] %}
            BED_MESH_CLEAR
        {% endif %}

        # Fan & mesh config per material
        {% set MESH = "default" %}
        {% if MATERIAL == "PLA" %}
            {% if printer['fan_generic cooling_fan'] %} SET_FAN_SPEED FAN=cooling_fan SPEED=1.00 {% endif %}
            {% if printer['fan_generic intake_fan'] %} SET_FAN_SPEED FAN=intake_fan SPEED=1.00 {% endif %}
            {% if printer['fan_generic exhaust_fan'] %} SET_FAN_SPEED FAN=exhaust_fan SPEED=1.00 {% endif %}
        {% elif MATERIAL == "PETG" %}
            {% if printer['fan_generic cooling_fan'] %} SET_FAN_SPEED FAN=cooling_fan SPEED=0.50 {% endif %}
            {% if printer['fan_generic intake_fan'] %} SET_FAN_SPEED FAN=intake_fan SPEED=0.50 {% endif %}
            {% if printer['fan_generic exhaust_fan'] %} SET_FAN_SPEED FAN=exhaust_fan SPEED=0.50 {% endif %}
            {% if printer['fan_generic Nevermore'] %} SET_FAN_SPEED FAN=Nevermore SPEED=0.50 {% endif %}
            {% set MESH = "default_petg" %}
        {% elif MATERIAL == "ABS" %}
            {% if printer['fan_generic Nevermore'] %} SET_FAN_SPEED FAN=Nevermore SPEED=1.00 {% endif %}
            {% set MESH = "default_abs" %}
        {% elif MATERIAL == "ASA" %}
            {% if printer['fan_generic Nevermore'] %} SET_FAN_SPEED FAN=Nevermore SPEED=1.00 {% endif %}
            {% set MESH = "default_abs" %}
        {% elif MATERIAL == "PC" %}
            {% if printer['fan_generic Nevermore'] %} SET_FAN_SPEED FAN=Nevermore SPEED=1.00 {% endif %}
            {% set MESH = "default_abs" %}
        {% elif MATERIAL == "TPU" %}
            {% if printer['fan_generic exhaust_fan'] %} SET_FAN_SPEED FAN=exhaust_fan SPEED=0.25 {% endif %}
        {% endif %}

        # Clean nozzle
        STATUS_CLEANING
        M118 PRINT_START: Cleaning nozzle...
        NOZZLE_START_CLEAN

        # Chamber wait if requested
        {% if CHAMBER_TEMP > 20 %}
            M118 PRINT_START: Waiting for chamber to reach {CHAMBER_TEMP}C...
            TEMPERATURE_WAIT SENSOR="temperature_sensor chamber_th" MINIMUM={CHAMBER_TEMP}
        {% endif %}

        # Full startup leveling
        STATUS_LEVELING
        M118 PRINT_START: Running QGL...
        G32

        # Static mesh reload
        BED_MESH_PROFILE LOAD="{MESH}"
    {% endif %}

    # Heat nozzle for both fast and normal start
    STATUS_HEATING
    M118 PRINT_START: Heating nozzle to {EXTRUDER}C...
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER}

    STATUS_READY
    M221 S{PRINT_FLOW_RATE}
    M400
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Printing..."

    M118 ============= PRINT_START COMPLETE =============