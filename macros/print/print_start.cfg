#####################################################################
# PRINT_VARS
#####################################################################

[gcode_macro PRINT_VARS]
variable_material: "PLA"
gcode:
    M118 PRINT_VARS: material={printer["gcode_macro PRINT_VARS"].material}

#####################################################################
# PRINT_START
#####################################################################

[gcode_macro PRINT_START]
gcode:
    M118 ============================================================
    M118 PRINT_START: BEGIN

    {% set MATERIAL_RAW     = params.MATERIAL|default("PLA")|string %}
    {% set MATERIAL         = MATERIAL_RAW|upper %}
    {% set BED              = params.BED|default(65)|float %}
    {% set BED_TEMP         = params.BED_TEMP|default(0)|float %}
    {% set EXTRUDER         = params.EXTRUDER|default(210)|float %}
    {% set EXTRUDER_TEMP    = params.EXTRUDER_TEMP|default(0)|float %}
    {% set PRINT_FLOW_RATE  = params.FLOW_RATE|default(100)|int %}
    {% set CHAMBER_TEMP     = params.CHAMBER_TEMP|default(params.CHAMBER|default(0))|float %}

    {% set heat_hold        = printer["gcode_macro CHAMBER_HEAT_HOLD"].enabled|int %}
    {% set standby_ready    = printer["gcode_macro HOT_STANDBY"].ready|int %}
    {% set last_material    = printer["gcode_macro PRINT_VARS"].material|upper %}
    {% set last_probe_z     = printer["gcode_macro HOT_STANDBY"].last_probe_z|float %}
    {% set tolerance        = 0.03 %}
    {% set fast_start       = 0 %}
    {% set MESH             = "default" %}

    M118 PRINT_START: RAW PARAMS -> MATERIAL_RAW={MATERIAL_RAW} BED={BED} BED_TEMP={BED_TEMP} EXTRUDER={EXTRUDER} EXTRUDER_TEMP={EXTRUDER_TEMP} CHAMBER_TEMP={CHAMBER_TEMP} FLOW={PRINT_FLOW_RATE}
    M118 PRINT_START: STATE -> MATERIAL={MATERIAL} last_material={last_material} heat_hold={heat_hold} standby_ready={standby_ready} last_probe_z={last_probe_z} homed_axes={printer.toolhead.homed_axes}

    {% if EXTRUDER_TEMP > 0 %}
        {% set EXTRUDER = EXTRUDER_TEMP %}
        M118 PRINT_START: EXTRUDER overridden by EXTRUDER_TEMP -> {EXTRUDER}
    {% endif %}
    {% if BED_TEMP > 0 %}
        {% set BED = BED_TEMP %}
        M118 PRINT_START: BED overridden by BED_TEMP -> {BED}
    {% endif %}

    SET_DISPLAY_TEXT MSG="Start {MATERIAL}"
    M118 PRINT_START: Display updated

    SET_GCODE_VARIABLE MACRO=PRINT_VARS VARIABLE=material VALUE="'{MATERIAL}'"
    M118 PRINT_START: Stored PRINT_VARS.material={MATERIAL}

    UPDATE_DELAYED_GCODE ID=HOT_STANDBY_TIMEOUT DURATION=0
    M118 PRINT_START: HOT_STANDBY_TIMEOUT cancelled
    UPDATE_DELAYED_GCODE ID=HOT_STANDBY_PURGE DURATION=0
    M118 PRINT_START: HOT_STANDBY_PURGE cancelled
    UPDATE_DELAYED_GCODE ID=_DISABLE_NEVERMORE DURATION=0
    M118 PRINT_START: _DISABLE_NEVERMORE cancelled
    UPDATE_DELAYED_GCODE ID=_DISABLE_EXHAUST DURATION=0
    M118 PRINT_START: _DISABLE_EXHAUST cancelled
    UPDATE_DELAYED_GCODE ID=_DISABLE_COOLING DURATION=0
    M118 PRINT_START: _DISABLE_COOLING cancelled
    UPDATE_DELAYED_GCODE ID=_DISABLE_INTAKE DURATION=0
    M118 PRINT_START: _DISABLE_INTAKE cancelled

    M118 PRINT_START: Running WAKEUP
    WAKEUP

    M118 PRINT_START: Running PI_FAN_PRINT
    PI_FAN_PRINT

    G21
    M118 PRINT_START: Units set to mm
    M220 S100
    M118 PRINT_START: Feed rate reset to 100%
    M221 S100
    M118 PRINT_START: Flow reset to 100%
    M107
    M118 PRINT_START: Part cooling fan off

    #################################################################
    # Fast-start eligibility check
    #################################################################

    {% if heat_hold == 1 and standby_ready == 1 and MATERIAL == last_material and printer.toolhead.homed_axes == "xyz" %}
        M118 PRINT_START: FAST START candidate detected
        SET_DISPLAY_TEXT MSG="Fast start check"

        G90
        M118 PRINT_START: Moving to sanity probe point X150 Y150
        G1 X150 Y150 F12000

        M118 PRINT_START: Running sanity PROBE
        PROBE

        {% set probe_now = printer.toolhead.position.z|float %}
        {% set delta = (probe_now - last_probe_z)|abs %}

        M118 PRINT_START: Sanity probe result old={last_probe_z} new={probe_now} delta={delta} tolerance={tolerance}

        {% if delta <= tolerance %}
            {% set fast_start = 1 %}
            M118 PRINT_START: FAST START APPROVED
        {% else %}
            M118 PRINT_START: FAST START FAILED - delta too large
        {% endif %}
    {% else %}
        M118 PRINT_START: FAST START not eligible
        M118 PRINT_START: Check values -> heat_hold={heat_hold} standby_ready={standby_ready} material_match={MATERIAL == last_material} homed_ok={printer.toolhead.homed_axes == "xyz"}
    {% endif %}

    #################################################################
    # FAST START PATH
    #################################################################

    {% if fast_start == 1 %}

        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=ready VALUE=0
        M118 PRINT_START: HOT_STANDBY.ready cleared
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=last_probe_z VALUE=0.0
        M118 PRINT_START: HOT_STANDBY.last_probe_z cleared

        M118 PRINT_START: FAST START MODE active
        SET_DISPLAY_TEXT MSG="Fast start"

        # Keep required environment controls for material even in fast start
        {% if ("ABS" in MATERIAL or "ASA" in MATERIAL or "PC" in MATERIAL) and printer['fan_generic Nevermore'] %}
            M118 PRINT_START: FAST START -> Setting Nevermore to 1.00 for {MATERIAL}
            SET_FAN_SPEED FAN=Nevermore SPEED=1.00
        {% elif MATERIAL == "PETG" and printer['fan_generic Nevermore'] %}
            M118 PRINT_START: FAST START -> Setting Nevermore to 0.50 for PETG
            SET_FAN_SPEED FAN=Nevermore SPEED=0.50
        {% else %}
            M118 PRINT_START: FAST START -> No Nevermore change required for {MATERIAL}
        {% endif %}

        M118 PRINT_START: Setting bed target to {BED}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}

        M118 PRINT_START: Waiting for bed to reach at least {BED}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED}

        M118 PRINT_START: FAST START -> Skipping BED_MESH_CLEAR
        M118 PRINT_START: FAST START -> Skipping NOZZLE_START_CLEAN
        M118 PRINT_START: FAST START -> Skipping G32
        M118 PRINT_START: FAST START -> Skipping BED_MESH_PROFILE LOAD

    #################################################################
    # NORMAL START PATH
    #################################################################

    {% else %}

        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=ready VALUE=0
        M118 PRINT_START: HOT_STANDBY.ready cleared
        SET_GCODE_VARIABLE MACRO=HOT_STANDBY VARIABLE=last_probe_z VALUE=0.0
        M118 PRINT_START: HOT_STANDBY.last_probe_z cleared

        M118 PRINT_START: NORMAL START MODE active

        M118 PRINT_START: Clearing existing bed mesh
        BED_MESH_CLEAR

        {% set MESH = "default" %}
        M118 PRINT_START: Default mesh preset = {MESH}

        # Reset enclosure fans to a known baseline before material-specific setup
        {% if printer['fan_generic cooling_fan'] %}
            M118 PRINT_START: Reset cooling_fan -> 0
            SET_FAN_SPEED FAN=cooling_fan SPEED=0
        {% else %}
            M118 PRINT_START: cooling_fan not present
        {% endif %}

        {% if printer['fan_generic intake_fan'] %}
            M118 PRINT_START: Reset intake_fan -> 0
            SET_FAN_SPEED FAN=intake_fan SPEED=0
        {% else %}
            M118 PRINT_START: intake_fan not present
        {% endif %}

        {% if printer['fan_generic exhaust_fan'] %}
            M118 PRINT_START: Reset exhaust_fan -> 0
            SET_FAN_SPEED FAN=exhaust_fan SPEED=0
        {% else %}
            M118 PRINT_START: exhaust_fan not present
        {% endif %}

        {% if printer['fan_generic Nevermore'] %}
            M118 PRINT_START: Reset Nevermore -> 0
            SET_FAN_SPEED FAN=Nevermore SPEED=0
        {% else %}
            M118 PRINT_START: Nevermore not present
        {% endif %}

        # Material-specific fan setup FIRST
        {% if MATERIAL == "PLA" %}
            M118 PRINT_START: MATERIAL branch -> PLA
            {% if printer['fan_generic cooling_fan'] %}
                M118 PRINT_START: PLA -> cooling_fan 1.00
                SET_FAN_SPEED FAN=cooling_fan SPEED=1.00
            {% endif %}
            {% if printer['fan_generic intake_fan'] %}
                M118 PRINT_START: PLA -> intake_fan 1.00
                SET_FAN_SPEED FAN=intake_fan SPEED=1.00
            {% endif %}
            {% if printer['fan_generic exhaust_fan'] %}
                M118 PRINT_START: PLA -> exhaust_fan 1.00
                SET_FAN_SPEED FAN=exhaust_fan SPEED=1.00
            {% endif %}
            {% set MESH = "default" %}
            M118 PRINT_START: PLA -> mesh set to {MESH}

        {% elif MATERIAL == "PETG" %}
            M118 PRINT_START: MATERIAL branch -> PETG
            {% if printer['fan_generic cooling_fan'] %}
                M118 PRINT_START: PETG -> cooling_fan 0.50
                SET_FAN_SPEED FAN=cooling_fan SPEED=0.50
            {% endif %}
            {% if printer['fan_generic intake_fan'] %}
                M118 PRINT_START: PETG -> intake_fan 0.50
                SET_FAN_SPEED FAN=intake_fan SPEED=0.50
            {% endif %}
            {% if printer['fan_generic exhaust_fan'] %}
                M118 PRINT_START: PETG -> exhaust_fan 0.50
                SET_FAN_SPEED FAN=exhaust_fan SPEED=0.50
            {% endif %}
            {% if printer['fan_generic Nevermore'] %}
                M118 PRINT_START: PETG -> Nevermore 0.50
                SET_FAN_SPEED FAN=Nevermore SPEED=0.50
            {% endif %}
            {% set MESH = "default_petg" %}
            M118 PRINT_START: PETG -> mesh set to {MESH}

        {% elif "ABS" in MATERIAL %}
            M118 PRINT_START: MATERIAL branch -> ABS family
            {% if printer['fan_generic Nevermore'] %}
                M118 PRINT_START: ABS family -> Nevermore 1.00
                SET_FAN_SPEED FAN=Nevermore SPEED=1.00
            {% else %}
                M118 PRINT_START: ABS family -> Nevermore not present
            {% endif %}
            {% set MESH = "default_abs" %}
            M118 PRINT_START: ABS family -> mesh set to {MESH}

        {% elif "ASA" in MATERIAL %}
            M118 PRINT_START: MATERIAL branch -> ASA family
            {% if printer['fan_generic Nevermore'] %}
                M118 PRINT_START: ASA family -> Nevermore 1.00
                SET_FAN_SPEED FAN=Nevermore SPEED=1.00
            {% else %}
                M118 PRINT_START: ASA family -> Nevermore not present
            {% endif %}
            {% set MESH = "default_abs" %}
            M118 PRINT_START: ASA family -> mesh set to {MESH}

        {% elif "PC" in MATERIAL %}
            M118 PRINT_START: MATERIAL branch -> PC family
            {% if printer['fan_generic Nevermore'] %}
                M118 PRINT_START: PC family -> Nevermore 1.00
                SET_FAN_SPEED FAN=Nevermore SPEED=1.00
            {% else %}
                M118 PRINT_START: PC family -> Nevermore not present
            {% endif %}
            {% set MESH = "default_abs" %}
            M118 PRINT_START: PC family -> mesh set to {MESH}

        {% elif MATERIAL == "TPU" %}
            M118 PRINT_START: MATERIAL branch -> TPU
            {% if printer['fan_generic exhaust_fan'] %}
                M118 PRINT_START: TPU -> exhaust_fan 0.25
                SET_FAN_SPEED FAN=exhaust_fan SPEED=0.25
            {% endif %}
            {% set MESH = "default" %}
            M118 PRINT_START: TPU -> mesh set to {MESH}

        {% else %}
            M118 PRINT_START: MATERIAL branch -> fallback/default
            {% set MESH = "default" %}
            M118 PRINT_START: Fallback -> mesh set to {MESH}
        {% endif %}

        # THEN start bed heat
        M118 PRINT_START: Setting bed target to {BED}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}

        M118 PRINT_START: Waiting for bed to reach at least {BED}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED}

        {% if CHAMBER_TEMP > 20 %}
            M118 PRINT_START: Waiting for chamber_th to reach {CHAMBER_TEMP}
            TEMPERATURE_WAIT SENSOR="temperature_sensor chamber_th" MINIMUM={CHAMBER_TEMP}
            M118 PRINT_START: Chamber temp reached target
        {% else %}
            M118 PRINT_START: Chamber wait skipped (target <= 20)
        {% endif %}

        M118 PRINT_START: Running NOZZLE_START_CLEAN
        NOZZLE_START_CLEAN

        M118 PRINT_START: Running G32
        G32

        M118 PRINT_START: Loading bed mesh profile {MESH}
        BED_MESH_PROFILE LOAD="{MESH}"

    {% endif %}

    #################################################################
    # Nozzle heat for both paths
    #################################################################

    M118 PRINT_START: Setting extruder target to {EXTRUDER}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER}

    M118 PRINT_START: Waiting for extruder to reach at least {EXTRUDER}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER}

    M118 PRINT_START: Setting flow rate to {PRINT_FLOW_RATE}%
    M221 S{PRINT_FLOW_RATE}

    STATUS_PRINTING
    M118 PRINT_START: STATUS_PRINTING set

    SET_DISPLAY_TEXT MSG="Printing"
    M118 PRINT_START: Display set to Printing

    M118 PRINT_START: COMPLETE
    M118 ============================================================