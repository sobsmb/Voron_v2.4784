[gcode_macro WAKEUP]
gcode:
  LOG_BLOCK MSG="WAKEUP BEGIN"
  M117 WakeUp Printer

  {% if printer['fan_generic exhaust_fan'] %}
    LOG MSG="WAKEUP: exhaust_fan -> 0"
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0
  {% endif %}

  {% if printer['fan_generic cooling_fan'] %}
    LOG MSG="WAKEUP: cooling_fan -> 0"
    SET_FAN_SPEED FAN=cooling_fan SPEED=0
  {% endif %}

  {% if printer['fan_generic intake_fan'] %}
    LOG MSG="WAKEUP: intake_fan -> 0"
    SET_FAN_SPEED FAN=intake_fan SPEED=0
  {% endif %}

  {% if printer['fan_generic Nevermore'] %}
    LOG MSG="WAKEUP: Nevermore -> 0"
    SET_FAN_SPEED FAN=Nevermore SPEED=0
  {% endif %}

  LOG MSG="WAKEUP: caselight on"
  SET_CASELIGHT_ON

  LOG MSG="WAKEUP: start temp monitor"
  START_TEMP_MONITOR

  STATUS_READY
  LOG MSG="WAKEUP: COMPLETE"