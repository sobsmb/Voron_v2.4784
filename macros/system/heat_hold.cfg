[gcode_macro CHAMBER_HEAT_HOLD]
variable_enabled: 0
gcode:
    {% set state = params.STATE|default("TOGGLE")|upper %}
    {% if state == "ON" %}
        SET_GCODE_VARIABLE MACRO=CHAMBER_HEAT_HOLD VARIABLE=enabled VALUE=1
        RESPOND MSG="Chamber heat hold ENABLED"
    {% elif state == "OFF" %}
        SET_GCODE_VARIABLE MACRO=CHAMBER_HEAT_HOLD VARIABLE=enabled VALUE=0
        RESPOND MSG="Chamber heat hold DISABLED"
    {% else %}
        {% if printer["gcode_macro CHAMBER_HEAT_HOLD"].enabled|int == 1 %}
            SET_GCODE_VARIABLE MACRO=CHAMBER_HEAT_HOLD VARIABLE=enabled VALUE=0
            RESPOND MSG="Chamber heat hold DISABLED"
        {% else %}
            SET_GCODE_VARIABLE MACRO=CHAMBER_HEAT_HOLD VARIABLE=enabled VALUE=1
            RESPOND MSG="Chamber heat hold ENABLED"
        {% endif %}
    {% endif %}

[gcode_macro HEAT_HOLD_ON]
gcode:
    CHAMBER_HEAT_HOLD STATE=ON

[gcode_macro HEAT_HOLD_OFF]
gcode:
    CHAMBER_HEAT_HOLD STATE=OFF