[z_calibration]
nozzle_xy_position:   230.5,350.00
#probe_nozzle_x: 348.50
#probe_nozzle_y: 350
switch_xy_position:   226,331.50
#probe_switch_x: 230
#probe_switch_y: 330.50
bed_xy_position:      178,148
# And remember: The smaller the switch-offset, the further the nozzle is away from the bed!
switch_offset:    0.60 # 0.70 # 0.55
offset_margins:        2.0
#safe_z_home:            7.5
speed:                200
probing_first_fast:  true
start_gcode:          Dock_Probe_Unlock
before_switch_gcode:  Attach_Probe
end_gcode:            Dock_Probe

