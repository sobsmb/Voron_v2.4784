#####################################################################
#  Main entrypoint for Voron V2.4 / 350 with Happy Hare MMU
#####################################################################

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

#####################################################################
#  Device IDs
#####################################################################
[mcu]
canbus_uuid: 2a2c471fb449

[mcu EBBCan]
canbus_uuid: 61feea49af74

#####################################################################
#  Basic Klipper and Printer setup
#####################################################################
[printer]
kinematics: corexy
max_velocity: 500
max_accel: 12000
max_z_velocity: 35
max_z_accel: 350
square_corner_velocity: 5
minimum_cruise_ratio: 0.2

[exclude_object]
[print_stats]
[respond]

[gcode_arcs]
resolution: 0.05

[idle_timeout]
timeout: 3600
gcode:
    {% if printer.pause_resume.is_paused %}
      M118 Idle Timeout reached
      M117 Disable hotend_fan
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
      STATUS_READY
    {% else %}
      SLEEP
    {% endif %}

[force_move]
enable_force_move: True

#####################################################################
#  Includes
#####################################################################

# Happy Hare (left untouched for easier updates)
[include mmu/base/*.cfg]
[include mmu/optional/mmu_menu.cfg]

# Printer config
[include hardware/*.cfg]
[include tuning/*.cfg]
[include features/*.cfg]

# MMU client / addon macros outside the mmu/ tree
[include mmu/optional/client_macros.cfg]
[include mmu/addons/blobifier.cfg]
[include macros/includes.cfg]


